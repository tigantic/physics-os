name: CI
on: [pull_request, push]
jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install
      - run: pnpm -w run build:tokens
      - run: pnpm -w run format:check
      - run: pnpm -w run lint
      - run: pnpm -w run typecheck
      - run: pnpm -w run build
      - run: pnpm -w run test:unit
      - run: pnpm -w run test:schema
      - run: pnpm -w run test:coverage
      - name: Security audit
        run: pnpm audit --audit-level=critical || true
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            packages/core/coverage/
            packages/ui/coverage/
          retention-days: 14
