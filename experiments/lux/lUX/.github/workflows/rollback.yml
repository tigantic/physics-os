name: Rollback

on:
  # Manual trigger — operator selects a tag to rollback to
  workflow_dispatch:
    inputs:
      target_tag:
        description: "Image tag to rollback to (e.g. sha-abc1234 or a specific version)"
        required: true
        type: string
      reason:
        description: "Reason for rollback"
        required: true
        type: string

  # Automatic trigger — fires when Deploy workflow's smoke-test job fails.
  # Listens for completed deploy runs and checks their conclusion.
  workflow_run:
    workflows: ["Deploy"]
    types: [completed]

permissions:
  contents: read
  packages: write

concurrency:
  group: rollback
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/lux

jobs:
  # ── Decide whether to rollback ───────────────────────────────────
  gate:
    runs-on: ubuntu-latest
    outputs:
      should_rollback: ${{ steps.decide.outputs.should_rollback }}
      target_tag: ${{ steps.decide.outputs.target_tag }}
      reason: ${{ steps.decide.outputs.reason }}
    steps:
      - name: Evaluate trigger
        id: decide
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should_rollback=true" >> "$GITHUB_OUTPUT"
            echo "target_tag=${{ inputs.target_tag }}" >> "$GITHUB_OUTPUT"
            echo "reason=${{ inputs.reason }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            CONCLUSION="${{ github.event.workflow_run.conclusion }}"
            BRANCH="${{ github.event.workflow_run.head_branch }}"
            if [[ "$CONCLUSION" == "failure" && "$BRANCH" == "main" ]]; then
              echo "should_rollback=true" >> "$GITHUB_OUTPUT"
              echo "target_tag=previous" >> "$GITHUB_OUTPUT"
              echo "reason=Automated: Deploy workflow failed on main (run #${{ github.event.workflow_run.run_number }})" >> "$GITHUB_OUTPUT"
            else
              echo "should_rollback=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "should_rollback=false" >> "$GITHUB_OUTPUT"
          fi

  # ── Record current latest & resolve target ───────────────────────
  resolve:
    needs: gate
    if: needs.gate.outputs.should_rollback == 'true'
    runs-on: ubuntu-latest
    outputs:
      previous_digest: ${{ steps.record.outputs.previous_digest }}
      target_digest: ${{ steps.resolve.outputs.target_digest }}
      resolved_tag: ${{ steps.resolve.outputs.resolved_tag }}
    steps:
      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install crane
        uses: imjasonh/setup-crane@v0.4

      - name: Record current latest digest
        id: record
        run: |
          LATEST_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          DIGEST=$(crane digest "$LATEST_IMAGE" 2>/dev/null || echo "none")
          echo "previous_digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "::notice::Current latest digest: $DIGEST"

      - name: Resolve target tag
        id: resolve
        run: |
          TARGET_TAG="${{ needs.gate.outputs.target_tag }}"

          if [[ "$TARGET_TAG" == "previous" ]]; then
            # Find the most recent tag that is NOT the current latest
            CURRENT_DIGEST="${{ steps.record.outputs.previous_digest }}"
            echo "::notice::Looking for the most recent non-latest tag..."

            # List all tags, find sha-* tags, check their digests
            TAGS=$(crane ls "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" 2>/dev/null | grep '^sha-' | sort -r)
            RESOLVED=""
            for TAG in $TAGS; do
              TAG_DIGEST=$(crane digest "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}" 2>/dev/null || echo "")
              if [[ -n "$TAG_DIGEST" && "$TAG_DIGEST" != "$CURRENT_DIGEST" ]]; then
                RESOLVED="$TAG"
                break
              fi
            done

            if [[ -z "$RESOLVED" ]]; then
              echo "::error::No previous tag found to rollback to"
              exit 1
            fi
            TARGET_TAG="$RESOLVED"
            echo "::notice::Auto-resolved rollback target: $TARGET_TAG"
          fi

          # Verify the target tag exists
          TARGET_DIGEST=$(crane digest "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TARGET_TAG}" 2>/dev/null)
          if [[ -z "$TARGET_DIGEST" ]]; then
            echo "::error::Target tag '$TARGET_TAG' does not exist in registry"
            exit 1
          fi

          echo "resolved_tag=$TARGET_TAG" >> "$GITHUB_OUTPUT"
          echo "target_digest=$TARGET_DIGEST" >> "$GITHUB_OUTPUT"
          echo "::notice::Rolling back to ${TARGET_TAG} (digest: ${TARGET_DIGEST})"

  # ── Smoke-test the rollback target BEFORE re-tagging ─────────────
  pre-rollback-smoke:
    needs: [gate, resolve]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run rollback target container
        run: |
          docker run -d --name lux-rollback-smoke \
            -p 3000:3000 \
            -e NODE_ENV=production \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.resolve.outputs.resolved_tag }}"

      - name: Wait for readiness
        run: |
          for i in $(seq 1 30); do
            if wget -qO- http://localhost:3000/api/ready 2>/dev/null; then
              echo "Rollback target health check passed"
              exit 0
            fi
            sleep 2
          done
          echo "::error::Rollback target health check failed after 60s"
          docker logs lux-rollback-smoke
          exit 1

      - name: Verify security headers
        run: |
          HEADERS=$(wget -qS --spider http://localhost:3000/ 2>&1)
          echo "$HEADERS"
          echo "$HEADERS" | grep -qi "x-content-type-options" || { echo "::error::Missing X-Content-Type-Options"; exit 1; }
          echo "$HEADERS" | grep -qi "x-frame-options" || { echo "::error::Missing X-Frame-Options"; exit 1; }
          echo "$HEADERS" | grep -qi "strict-transport-security" || { echo "::error::Missing HSTS"; exit 1; }
          echo "Security headers verified on rollback target"

      - name: Cleanup
        if: always()
        run: docker rm -f lux-rollback-smoke 2>/dev/null || true

  # ── Execute rollback: re-tag target as latest ────────────────────
  rollback:
    needs: [gate, resolve, pre-rollback-smoke]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install crane
        uses: imjasonh/setup-crane@v0.4

      - name: Re-tag target as latest
        run: |
          SOURCE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.resolve.outputs.resolved_tag }}"
          TARGET="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"

          echo "::notice::Re-tagging $SOURCE → latest"
          crane tag "$SOURCE" latest

          # Verify the re-tag was successful
          NEW_LATEST_DIGEST=$(crane digest "$TARGET")
          EXPECTED="${{ needs.resolve.outputs.target_digest }}"
          if [[ "$NEW_LATEST_DIGEST" != "$EXPECTED" ]]; then
            echo "::error::Digest mismatch after re-tag. Expected: $EXPECTED, Got: $NEW_LATEST_DIGEST"
            exit 1
          fi
          echo "::notice::Rollback complete. latest now points to $NEW_LATEST_DIGEST"

      - name: Write rollback summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          ## Rollback Executed

          | Field | Value |
          |-------|-------|
          | **Trigger** | ${{ github.event_name }} |
          | **Reason** | ${{ needs.gate.outputs.reason }} |
          | **Previous latest** | `${{ needs.resolve.outputs.previous_digest }}` |
          | **Rolled back to** | `${{ needs.resolve.outputs.resolved_tag }}` (`${{ needs.resolve.outputs.target_digest }}`) |
          | **Timestamp** | ${{ github.event.created_at || 'N/A' }} |
          | **Actor** | @${{ github.actor }} |
          EOF
