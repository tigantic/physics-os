# ── lUX Secret ──────────────────────────────────────────────────────────────────
# PLACEHOLDER — replace with Sealed Secrets or External Secrets in production.
# Never commit real secrets to version control.
apiVersion: v1
kind: Secret
metadata:
  name: lux-secrets
  namespace: lux
  labels:
    app.kubernetes.io/name: lux
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # Optional: set to enable API key authentication.
  # LUX_API_KEY: "your-api-key-here"
  # Optional: JSON map of API keys to roles.
  # LUX_AUTH_ROLES: '{"your-api-key-here": "admin"}'
  PLACEHOLDER: "replace-with-real-secrets"
