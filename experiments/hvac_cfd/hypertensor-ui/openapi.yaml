openapi: 3.1.0
info:
  title: HyperTensor CFD Engine API
  version: 1.0.0
  description: |
    GPU-Accelerated CFD Engine with QTT Compression
    
    The HyperTensor API provides programmatic access to the HyperGrid CFD solver,
    mesh management, and real-time simulation monitoring.
  contact:
    name: TiganticLabz
    email: api@tiganticlabz.com
  license:
    name: MIT
    identifier: MIT

servers:
  - url: http://localhost:8000
    description: Development server
  - url: https://api.hypertensor.io
    description: Production server

tags:
  - name: Simulations
    description: CFD simulation management
  - name: Meshes
    description: Computational mesh operations
  - name: Fields
    description: Solution field data access
  - name: System
    description: System status and monitoring
  - name: Benchmarks
    description: Performance benchmarking

paths:
  # ==========================================
  # SIMULATIONS
  # ==========================================
  /api/v1/simulations:
    get:
      operationId: listSimulations
      tags: [Simulations]
      summary: List all simulations
      parameters:
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/SimulationStatus'
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: List of simulations
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/SimulationSummary'
                  total:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer

    post:
      operationId: createSimulation
      tags: [Simulations]
      summary: Create a new simulation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SimulationCreate'
      responses:
        '201':
          description: Simulation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Simulation'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/simulations/{id}:
    parameters:
      - $ref: '#/components/parameters/SimulationId'

    get:
      operationId: getSimulation
      tags: [Simulations]
      summary: Get simulation details
      responses:
        '200':
          description: Simulation details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Simulation'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      operationId: deleteSimulation
      tags: [Simulations]
      summary: Delete a simulation
      responses:
        '204':
          description: Simulation deleted
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/simulations/{id}/start:
    parameters:
      - $ref: '#/components/parameters/SimulationId'
    post:
      operationId: startSimulation
      tags: [Simulations]
      summary: Start or resume simulation
      responses:
        '200':
          description: Simulation started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Simulation'
        '409':
          description: Simulation cannot be started (already running or completed)

  /api/v1/simulations/{id}/pause:
    parameters:
      - $ref: '#/components/parameters/SimulationId'
    post:
      operationId: pauseSimulation
      tags: [Simulations]
      summary: Pause a running simulation
      responses:
        '200':
          description: Simulation paused
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Simulation'
        '409':
          description: Simulation is not running

  /api/v1/simulations/{id}/stop:
    parameters:
      - $ref: '#/components/parameters/SimulationId'
    post:
      operationId: stopSimulation
      tags: [Simulations]
      summary: Stop simulation permanently
      responses:
        '200':
          description: Simulation stopped
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Simulation'

  /api/v1/simulations/{id}/residuals:
    parameters:
      - $ref: '#/components/parameters/SimulationId'
    get:
      operationId: getResiduals
      tags: [Simulations]
      summary: Get convergence residuals
      parameters:
        - name: from_iteration
          in: query
          schema:
            type: integer
            default: 0
        - name: step
          in: query
          description: Sample every N iterations
          schema:
            type: integer
            default: 1
      responses:
        '200':
          description: Residual history
          content:
            application/json:
              schema:
                type: object
                properties:
                  simulationId:
                    type: string
                    format: uuid
                  residuals:
                    type: array
                    items:
                      $ref: '#/components/schemas/ResidualPoint'

  /api/v1/simulations/{id}/settings:
    parameters:
      - $ref: '#/components/parameters/SimulationId'
    patch:
      operationId: updateSettings
      tags: [Simulations]
      summary: Update solver settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SolverSettings'
      responses:
        '200':
          description: Settings updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Simulation'

  # ==========================================
  # MESHES
  # ==========================================
  /api/v1/meshes:
    get:
      operationId: listMeshes
      tags: [Meshes]
      summary: List all meshes
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: List of meshes
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/MeshSummary'
                  total:
                    type: integer

    post:
      operationId: createMesh
      tags: [Meshes]
      summary: Create mesh from geometry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MeshCreate'
      responses:
        '201':
          description: Mesh created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Mesh'

  /api/v1/meshes/upload:
    post:
      operationId: uploadMesh
      tags: [Meshes]
      summary: Upload mesh file (OpenFOAM, STL, CGNS)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                name:
                  type: string
                format:
                  type: string
                  enum: [openfoam, stl, cgns]
              required: [file]
      responses:
        '201':
          description: Mesh uploaded and processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Mesh'

  /api/v1/meshes/{id}:
    parameters:
      - $ref: '#/components/parameters/MeshId'

    get:
      operationId: getMesh
      tags: [Meshes]
      summary: Get mesh details
      responses:
        '200':
          description: Mesh details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Mesh'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      operationId: deleteMesh
      tags: [Meshes]
      summary: Delete a mesh
      responses:
        '204':
          description: Mesh deleted
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/meshes/{id}/patches:
    parameters:
      - $ref: '#/components/parameters/MeshId'

    get:
      operationId: listPatches
      tags: [Meshes]
      summary: List boundary patches
      responses:
        '200':
          description: List of patches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BoundaryPatch'

    post:
      operationId: addPatch
      tags: [Meshes]
      summary: Add a boundary patch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BoundaryPatch'
      responses:
        '201':
          description: Patch added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BoundaryPatch'

  /api/v1/meshes/{id}/export:
    parameters:
      - $ref: '#/components/parameters/MeshId'
    get:
      operationId: exportMesh
      tags: [Meshes]
      summary: Export mesh to file
      parameters:
        - name: format
          in: query
          required: true
          schema:
            type: string
            enum: [openfoam, vtk, cgns]
      responses:
        '200':
          description: Mesh file
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  # ==========================================
  # FIELDS
  # ==========================================
  /api/v1/simulations/{id}/fields:
    parameters:
      - $ref: '#/components/parameters/SimulationId'
    get:
      operationId: listFields
      tags: [Fields]
      summary: List available solution fields
      responses:
        '200':
          description: List of fields
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FieldMetadata'

  /api/v1/simulations/{id}/fields/{fieldName}:
    parameters:
      - $ref: '#/components/parameters/SimulationId'
      - name: fieldName
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: getFieldData
      tags: [Fields]
      summary: Get field data
      parameters:
        - name: iteration
          in: query
          schema:
            type: integer
          description: Specific iteration (default latest)
        - name: format
          in: query
          schema:
            type: string
            enum: [json, binary, vtk]
            default: json
      responses:
        '200':
          description: Field data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FieldData'

  /api/v1/simulations/{id}/fields/{fieldName}/slice:
    parameters:
      - $ref: '#/components/parameters/SimulationId'
      - name: fieldName
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: getFieldSlice
      tags: [Fields]
      summary: Get 2D slice of field data
      parameters:
        - name: plane
          in: query
          required: true
          schema:
            type: string
            enum: [xy, xz, yz]
        - name: position
          in: query
          required: true
          schema:
            type: number
          description: Position along normal axis
        - name: resolution
          in: query
          schema:
            type: integer
            default: 256
      responses:
        '200':
          description: Slice data
          content:
            application/json:
              schema:
                type: object
                properties:
                  plane:
                    type: string
                  position:
                    type: number
                  width:
                    type: integer
                  height:
                    type: integer
                  data:
                    type: array
                    items:
                      type: number

  # ==========================================
  # SYSTEM
  # ==========================================
  /api/v1/system/status:
    get:
      operationId: getSystemStatus
      tags: [System]
      summary: Get system status
      responses:
        '200':
          description: System status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemStatus'

  /api/v1/system/gpus:
    get:
      operationId: listGPUs
      tags: [System]
      summary: List available GPUs
      responses:
        '200':
          description: List of GPUs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GPUInfo'

  /api/v1/system/health:
    get:
      operationId: healthCheck
      tags: [System]
      summary: Health check endpoint
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [healthy, degraded, unhealthy]
                  version:
                    type: string
                  uptime:
                    type: number
                    description: Uptime in seconds

  # ==========================================
  # BENCHMARKS
  # ==========================================
  /api/v1/benchmarks:
    get:
      operationId: listBenchmarks
      tags: [Benchmarks]
      summary: List available benchmarks
      responses:
        '200':
          description: List of benchmarks
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    name:
                      type: string
                    description:
                      type: string
                    category:
                      type: string
                      enum: [validation, performance, stress]

    post:
      operationId: runBenchmark
      tags: [Benchmarks]
      summary: Run a benchmark
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                benchmarkId:
                  type: string
                parameters:
                  type: object
                  additionalProperties: true
              required: [benchmarkId]
      responses:
        '202':
          description: Benchmark started
          content:
            application/json:
              schema:
                type: object
                properties:
                  runId:
                    type: string
                    format: uuid
                  status:
                    type: string
                    enum: [queued, running]

  /api/v1/benchmarks/runs/{runId}:
    parameters:
      - name: runId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      operationId: getBenchmarkRun
      tags: [Benchmarks]
      summary: Get benchmark run results
      responses:
        '200':
          description: Benchmark results
          content:
            application/json:
              schema:
                type: object
                properties:
                  runId:
                    type: string
                    format: uuid
                  benchmarkId:
                    type: string
                  status:
                    type: string
                    enum: [queued, running, completed, failed]
                  startedAt:
                    type: string
                    format: date-time
                  completedAt:
                    type: string
                    format: date-time
                  results:
                    type: object
                    additionalProperties: true

# ==========================================
# COMPONENTS
# ==========================================
components:
  parameters:
    SimulationId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Simulation UUID

    MeshId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Mesh UUID

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    Conflict:
      description: Resource state conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    # ------------------------------------------
    # Error
    # ------------------------------------------
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
      required: [code, message]

    # ------------------------------------------
    # Simulation
    # ------------------------------------------
    SimulationStatus:
      type: string
      enum: [pending, running, paused, completed, failed]

    SolverType:
      type: string
      enum: [steady, transient, pseudo-transient]

    TurbulenceModel:
      type: string
      enum: [laminar, ke-standard, ke-realizable, kw-sst, sa, les-smagorinsky, des]

    SolverSettings:
      type: object
      properties:
        solver_type:
          $ref: '#/components/schemas/SolverType'
        turbulence_model:
          $ref: '#/components/schemas/TurbulenceModel'
        max_iterations:
          type: integer
          minimum: 1
          maximum: 100000
          default: 5000
        convergence_tolerance:
          type: number
          format: double
          minimum: 1e-12
          maximum: 1e-1
          default: 1e-6
        cfl_number:
          type: number
          minimum: 0.1
          maximum: 100
          default: 0.9
        time_step:
          type: number
          format: double
          description: Required for transient simulations
        end_time:
          type: number
          format: double
          description: Required for transient simulations
        relaxation_factors:
          type: object
          properties:
            pressure:
              type: number
              minimum: 0.01
              maximum: 1
              default: 0.3
            velocity:
              type: number
              minimum: 0.01
              maximum: 1
              default: 0.7
            energy:
              type: number
              minimum: 0.01
              maximum: 1
              default: 0.9
            turbulence:
              type: number
              minimum: 0.01
              maximum: 1
              default: 0.7
        discretization:
          type: object
          properties:
            convection:
              type: string
              enum: [upwind, central, quick, muscl, weno]
              default: muscl
            gradient:
              type: string
              enum: [green-gauss, least-squares, weighted-least-squares]
              default: green-gauss
            time:
              type: string
              enum: [euler-implicit, crank-nicolson, bdf2, rk4]
        gpu_acceleration:
          type: boolean
          default: true
        precision:
          type: string
          enum: [fp32, fp64, mixed]
          default: mixed

    PerformanceMetrics:
      type: object
      properties:
        throughput:
          type: number
          description: Million cells/second
        gpu_utilization:
          type: number
          minimum: 0
          maximum: 100
        vram_used_gb:
          type: number
        wall_time_seconds:
          type: number

    ResidualPoint:
      type: object
      properties:
        iteration:
          type: integer
        continuity:
          type: number
        momentum_x:
          type: number
        momentum_y:
          type: number
        momentum_z:
          type: number
        energy:
          type: number
        k:
          type: number
        epsilon:
          type: number
        omega:
          type: number
      required: [iteration, continuity]

    SimulationSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        status:
          $ref: '#/components/schemas/SimulationStatus'
        meshId:
          type: string
          format: uuid
        meshName:
          type: string
        currentIteration:
          type: integer
        maxIterations:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, name, status, createdAt]

    Simulation:
      allOf:
        - $ref: '#/components/schemas/SimulationSummary'
        - type: object
          properties:
            description:
              type: string
            settings:
              $ref: '#/components/schemas/SolverSettings'
            performance:
              $ref: '#/components/schemas/PerformanceMetrics'
            startedAt:
              type: string
              format: date-time
            completedAt:
              type: string
              format: date-time
            error:
              type: string

    SimulationCreate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
        meshId:
          type: string
          format: uuid
        settings:
          $ref: '#/components/schemas/SolverSettings'
      required: [name, meshId]

    # ------------------------------------------
    # Mesh
    # ------------------------------------------
    PatchType:
      type: string
      enum: [inlet, outlet, wall, symmetry, periodic, empty]

    BoundaryPatch:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        type:
          $ref: '#/components/schemas/PatchType'
        faceCount:
          type: integer
        velocity:
          type: array
          items:
            type: number
          minItems: 3
          maxItems: 3
        pressure:
          type: number
        temperature:
          type: number
      required: [name, type]

    MeshSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        cellCount:
          type: integer
        patchCount:
          type: integer
        createdAt:
          type: string
          format: date-time
      required: [id, name, cellCount, patchCount, createdAt]

    Mesh:
      allOf:
        - $ref: '#/components/schemas/MeshSummary'
        - type: object
          properties:
            description:
              type: string
            dimensions:
              type: object
              properties:
                x:
                  type: array
                  items:
                    type: number
                  minItems: 2
                  maxItems: 2
                y:
                  type: array
                  items:
                    type: number
                  minItems: 2
                  maxItems: 2
                z:
                  type: array
                  items:
                    type: number
                  minItems: 2
                  maxItems: 2
            resolution:
              type: object
              properties:
                nx:
                  type: integer
                ny:
                  type: integer
                nz:
                  type: integer
            patches:
              type: array
              items:
                $ref: '#/components/schemas/BoundaryPatch'
            qualityMetrics:
              type: object
              properties:
                minOrthogonality:
                  type: number
                maxSkewness:
                  type: number
                maxAspectRatio:
                  type: number

    MeshCreate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
        dimensions:
          type: object
          properties:
            x:
              type: array
              items:
                type: number
              minItems: 2
              maxItems: 2
            y:
              type: array
              items:
                type: number
              minItems: 2
              maxItems: 2
            z:
              type: array
              items:
                type: number
              minItems: 2
              maxItems: 2
          required: [x, y, z]
        resolution:
          type: object
          properties:
            nx:
              type: integer
              minimum: 1
            ny:
              type: integer
              minimum: 1
            nz:
              type: integer
              minimum: 1
          required: [nx, ny, nz]
        patches:
          type: array
          items:
            $ref: '#/components/schemas/BoundaryPatch'
      required: [name, dimensions, resolution]

    # ------------------------------------------
    # Fields
    # ------------------------------------------
    FieldMetadata:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
          enum: [scalar, vector, tensor]
        dimensions:
          type: string
          description: OpenFOAM dimension set
        min:
          type: number
        max:
          type: number
        mean:
          type: number
      required: [name, type]

    FieldData:
      type: object
      properties:
        name:
          type: string
        iteration:
          type: integer
        type:
          type: string
          enum: [scalar, vector, tensor]
        cellCount:
          type: integer
        values:
          type: array
          items:
            oneOf:
              - type: number
              - type: array
                items:
                  type: number
        statistics:
          type: object
          properties:
            min:
              type: number
            max:
              type: number
            mean:
              type: number
            stddev:
              type: number
      required: [name, iteration, type, cellCount]

    # ------------------------------------------
    # System
    # ------------------------------------------
    SystemStatus:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
        version:
          type: string
        uptime:
          type: number
          description: Uptime in seconds
        activeSimulations:
          type: integer
        queuedSimulations:
          type: integer
        gpuCount:
          type: integer
        gpuUtilization:
          type: number
          description: Average GPU utilization percentage
        memoryUsedGb:
          type: number
        memoryTotalGb:
          type: number
      required: [status, version, uptime]

    GPUInfo:
      type: object
      properties:
        index:
          type: integer
        name:
          type: string
        driverVersion:
          type: string
        cudaVersion:
          type: string
        memoryTotal:
          type: number
          description: Total memory in GB
        memoryUsed:
          type: number
          description: Used memory in GB
        memoryFree:
          type: number
          description: Free memory in GB
        utilization:
          type: number
          description: GPU utilization percentage
        temperature:
          type: number
          description: Temperature in Celsius
        powerDraw:
          type: number
          description: Power draw in Watts
      required: [index, name, memoryTotal, memoryUsed, utilization]

# ==========================================
# WEBHOOKS
# ==========================================
webhooks:
  simulationStatusChanged:
    post:
      summary: Simulation status changed
      description: Fired when a simulation transitions between states
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                event:
