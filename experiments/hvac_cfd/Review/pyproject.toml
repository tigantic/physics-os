[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "hyperfoam"
version = "0.1.0"
description = "GPU-Native CFD for HVAC Comfort Analysis"
readme = "README.md"
license = "MIT"
authors = [
    { name = "Tigantic Labz", email = "engineering@tiganticlabz.com" }
]
keywords = ["cfd", "hvac", "gpu", "cuda", "thermal-comfort", "ashrae"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: GPU :: NVIDIA CUDA",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Physics",
]
requires-python = ">=3.10"
dependencies = [
    "torch>=2.0",
    "numpy>=1.24",
    "matplotlib>=3.7",
    "dearpygui>=1.9",
    "reportlab>=4.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "black>=23.0",
    "mypy>=1.0",
]

[project.scripts]
hyperfoam = "hyperfoam.__main__:main"

[project.urls]
Homepage = "https://github.com/tiganticlabz/hyperfoam"
Documentation = "https://hyperfoam.readthedocs.io"
Repository = "https://github.com/tiganticlabz/hyperfoam"

[tool.hatch.build.targets.wheel]
packages = ["hyperfoam"]
