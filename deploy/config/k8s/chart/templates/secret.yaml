{{- if eq .Values.secrets.method "kubernetes" }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "fluidelite.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fluidelite.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.secrets.apiKey }}
  api-key: {{ .Values.secrets.apiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.signingKey }}
  signing-key: {{ .Values.secrets.signingKey | quote }}
  {{- end }}
{{- end }}
---
{{- if and .Values.secrets.sealedSecrets.enabled (eq .Values.secrets.method "sealed-secrets") }}
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: {{ include "fluidelite.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fluidelite.labels" . | nindent 4 }}
spec:
  encryptedData:
    {{- if .Values.secrets.sealedSecrets.encryptedApiKey }}
    api-key: {{ .Values.secrets.sealedSecrets.encryptedApiKey | quote }}
    {{- end }}
    {{- if .Values.secrets.sealedSecrets.encryptedSigningKey }}
    signing-key: {{ .Values.secrets.sealedSecrets.encryptedSigningKey | quote }}
    {{- end }}
  template:
    metadata:
      name: {{ include "fluidelite.fullname" . }}-secrets
      namespace: {{ .Release.Namespace }}
      labels:
        {{- include "fluidelite.labels" . | nindent 4 }}
    type: Opaque
{{- end }}
---
{{- if and .Values.secrets.externalSecrets.enabled (eq .Values.secrets.method "external-secrets") }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "fluidelite.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fluidelite.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.secrets.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.secrets.externalSecrets.secretStore.name }}
    kind: {{ .Values.secrets.externalSecrets.secretStore.kind }}
  target:
    name: {{ include "fluidelite.fullname" . }}-secrets
    creationPolicy: Owner
  data:
    - secretKey: api-key
      remoteRef:
        key: {{ .Values.secrets.externalSecrets.vaultApiKeyPath }}
        property: value
    - secretKey: signing-key
      remoteRef:
        key: {{ .Values.secrets.externalSecrets.vaultSigningKeyPath }}
        property: value
{{- end }}
