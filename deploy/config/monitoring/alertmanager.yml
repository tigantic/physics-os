# ════════════════════════════════════════════════════════════════════════
# FluidElite Trustless Physics — Alertmanager Configuration
# ════════════════════════════════════════════════════════════════════════
#
# Deploy: kubectl apply -f alertmanager.yml -n monitoring
# Or mount as ConfigMap for Prometheus Operator's Alertmanager CR.
#
# Routes:
#   critical → PagerDuty (immediate) + Slack #fluidelite-critical
#   warning  → Slack #fluidelite-alerts
#   info     → Slack #fluidelite-status (silenced by default)
# ════════════════════════════════════════════════════════════════════════

global:
  resolve_timeout: 5m
  pagerduty_url: "https://events.pagerduty.com/v2/enqueue"
  slack_api_url: "${ALERTMANAGER_SLACK_WEBHOOK_URL}"

# ── Inhibition rules ─────────────────────────────────────────────────
# Suppress warning alerts when a critical alert for the same group fires.
inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal: ["alertname", "team"]

# ── Routing tree ─────────────────────────────────────────────────────
route:
  receiver: slack-warnings
  group_by: ["alertname", "team", "namespace"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    # Critical alerts → PagerDuty + Slack
    - matchers:
        - severity="critical"
      receiver: pagerduty-critical
      group_wait: 10s
      repeat_interval: 1h
      continue: true
    - matchers:
        - severity="critical"
      receiver: slack-critical
      group_wait: 10s
      repeat_interval: 1h

    # Warning alerts → Slack
    - matchers:
        - severity="warning"
      receiver: slack-warnings
      group_wait: 30s
      repeat_interval: 4h

# ── Receivers ────────────────────────────────────────────────────────
receivers:
  - name: "slack-critical"
    slack_configs:
      - channel: "#fluidelite-critical"
        send_resolved: true
        title: '🚨 {{ .GroupLabels.alertname }} [{{ .Status | toUpper }}]'
        text: >-
          *Alert:* {{ .GroupLabels.alertname }}
          *Severity:* {{ .CommonLabels.severity }}
          *Namespace:* {{ .CommonLabels.namespace }}
          *Team:* {{ .CommonLabels.team }}

          {{ range .Alerts }}
          *Description:* {{ .Annotations.description }}
          *Runbook:* {{ .Annotations.runbook_url }}
          {{ end }}
        actions:
          - type: button
            text: "View Runbook"
            url: "{{ (index .Alerts 0).Annotations.runbook_url }}"
          - type: button
            text: "View in Grafana"
            url: "https://grafana.internal/d/fluidelite-prover"

  - name: "slack-warnings"
    slack_configs:
      - channel: "#fluidelite-alerts"
        send_resolved: true
        title: '⚠️ {{ .GroupLabels.alertname }} [{{ .Status | toUpper }}]'
        text: >-
          *Alert:* {{ .GroupLabels.alertname }}
          *Severity:* {{ .CommonLabels.severity }}
          *Namespace:* {{ .CommonLabels.namespace }}

          {{ range .Alerts }}
          {{ .Annotations.description }}
          {{ end }}

  - name: "pagerduty-critical"
    pagerduty_configs:
      - routing_key: "${PAGERDUTY_ROUTING_KEY}"
        severity: critical
        description: '{{ .GroupLabels.alertname }}: {{ (index .Alerts 0).Annotations.summary }}'
        details:
          alertname: "{{ .GroupLabels.alertname }}"
          team: "{{ .CommonLabels.team }}"
          namespace: "{{ .CommonLabels.namespace }}"
          runbook: "{{ (index .Alerts 0).Annotations.runbook_url }}"
