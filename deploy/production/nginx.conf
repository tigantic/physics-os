# ── Physics OS — nginx reverse proxy ────────────────────────────────
# Terminates TLS, rate-limits, proxies to Gunicorn on 127.0.0.1:8000.
#
# Install:
#   sudo cp deploy/production/nginx.conf /etc/nginx/sites-available/physics-os
#   sudo ln -sf /etc/nginx/sites-available/physics-os /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS managed by Certbot / Let's Encrypt automatically.
# ────────────────────────────────────────────────────────────────────

# Rate limiting zone: 10 req/s per IP, 10MB shared memory
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

upstream physics_os {
    server 127.0.0.1:8000 fail_timeout=30s max_fails=3;
    keepalive 32;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name api.physics-os.com;

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — main API
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.physics-os.com;

    # ── TLS (managed by certbot) ────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/api.physics-os.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.physics-os.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security headers ────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Request limits ──────────────────────────────────────────────
    client_max_body_size 10m;
    client_body_timeout  30s;
    client_header_timeout 30s;

    # ── Logging ─────────────────────────────────────────────────────
    access_log /var/log/nginx/physics-os.access.log combined buffer=16k flush=5s;
    error_log  /var/log/nginx/physics-os.error.log warn;

    # ── Health check (no rate limit, no auth) ───────────────────────
    location = /v1/health {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://physics_os;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
    }

    # ── Stripe webhook (higher limits) ──────────────────────────────
    location = /v1/billing/webhook {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://physics_os;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        # Stripe needs raw body for signature verification
        proxy_buffering off;
    }

    # ── API routes ──────────────────────────────────────────────────
    location / {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://physics_os;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header Connection "";

        proxy_http_version 1.1;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 300s;  # Match job timeout

        # Don't buffer large responses
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 8k;
    }

    # ── Block dotfiles ──────────────────────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }
}
