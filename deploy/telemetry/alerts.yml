# Prometheus alerting rules for HyperTensor
groups:
  - name: hypertensor-api
    rules:
      - alert: APIHighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{service="hypertensor-api"}[5m])) > 2.0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API p95 latency > 2s"
          description: "{{ $labels.instance }} p95 latency is {{ $value }}s"

      - alert: APIHighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "API 5xx error rate > 5%"

      - alert: APIDown
        expr: up{job="hypertensor-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "HyperTensor API is down"

  - name: hypertensor-jobs
    rules:
      - alert: JobQueueBacklog
        expr: hypertensor_job_queue_depth > 100
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Job queue depth > 100 for 10 minutes"

      - alert: JobFailureRate
        expr: rate(hypertensor_jobs_failed_total[15m]) / rate(hypertensor_jobs_completed_total[15m]) > 0.1
        for: 15m
        labels:
          severity: critical
        annotations:
          summary: "Job failure rate > 10%"

  - name: physics-validation
    rules:
      - alert: PhysicsValidationDrift
        expr: hypertensor_physics_residual_l2 > 1e-6
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Physics validation residual above tolerance"

      - alert: CompressionRatioRegression
        expr: hypertensor_compression_ratio < 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Compression ratio dropped below 100x"
