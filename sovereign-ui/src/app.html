<!doctype html>
<html lang="en" class="dark">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="description" content="Sovereign Intelligence - Interface to Cognition" />
		<meta name="theme-color" content="#08080A" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
		<title>Sovereign</title>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">
			<!-- Pre-mount loading indicator — replaced when Svelte mounts -->
			<div id="sov-preload" style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#08080A;font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;">
				<div style="text-align:center;">
					<div style="width:48px;height:48px;background:#6366F1;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;color:white;margin:0 auto 12px;">FPS</div>
					<div style="font-size:20px;font-weight:600;color:#F3F4F6;">Sovereign</div>
					<div style="font-size:13px;color:#6B7280;margin-top:6px;">Loading...</div>
					<div style="width:200px;height:3px;background:#1F2937;border-radius:2px;margin:16px auto 0;overflow:hidden;">
						<div style="height:100%;width:30%;background:#6366F1;border-radius:2px;animation:sovPulse 1.5s ease-in-out infinite;"></div>
					</div>
				</div>
			</div>
			<style>@keyframes sovPulse{0%,100%{width:30%;margin-left:0}50%{width:60%;margin-left:20%}}</style>
			%sveltekit.body%
		</div>
		<script>
			// Remove preloader once Svelte mounts
			const observer = new MutationObserver(() => {
				const el = document.getElementById('sov-preload');
				if (el && document.querySelector('.sov-shell,.sov-boot')) {
					el.remove();
					observer.disconnect();
				}
			});
			observer.observe(document.body, { childList: true, subtree: true });
			// Fallback: remove after 10s regardless
			setTimeout(() => { const el = document.getElementById('sov-preload'); if (el) el.remove(); }, 10000);
		</script>
	</body>
</html>
