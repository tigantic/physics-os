[profile.default]
src = "src"
out = "out"
libs = ["lib"]
remappings = [
    "forge-std/=lib/forge-std/src/",
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/"
]
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
gas_reports = ["Groth16Verifier", "ZeroExpansionSemaphoreVerifier"]
fuzz = { runs = 512, seed = "0x4859504552" }

[profile.ci]
fuzz = { runs = 4096 }
