# FluidElite V1 - Gevulot Firestarter Task Descriptor
# =====================================================
#
# This is the "Work Order" for the Gevulot network.
# The network downloads your image, runs it, and returns the proof.
#
# Submit with:
#   export GEVULOT_ENDPOINT="https://rpc.firestarter.gevulot.com"
#   export GEVULOT_MNEMONIC="your twelve word phrase here"
#   gvltctl task create -f task.yaml
#
# Fetch result:
#   gvltctl task get <TASK_ID>

kind: Task
version: v0

metadata:
  name: 'FluidElite-Inference'
  description: 'ZK-LLM Hybrid Proof Generation - 88 TPS'
  tags:
    - ai
    - zkml
    - halo2
    - fluidelite

spec:
  # 1. Your hosted VM image (GitHub Release, S3, etc.)
  # IMPORTANT: This URL must stay alive as long as tasks run!
  image: 'https://github.com/tigantic/HyperTensor-VM/releases/download/v1.0.0-zk/fluidelite.img'
  
  # 2. Command to run inside the VM
  command: ['/program']
  
  # 3. Input Data - mapped to /mnt/gevulot/input/
  inputContexts:
    # Option A: Inline data (for testing)
    - source: 'data:application/json,{"context":"The quick brown fox jumps over the lazy","include_proof":true}'
      target: '/mnt/gevulot/input/task_input.json'
    
    # Option B: URL to input file (for production)
    # - source: 'https://your-server.com/inputs/request_123.json'
    #   target: '/mnt/gevulot/input/task_input.json'
  
  # 4. Output - proof written to /mnt/gevulot/output/
  outputContexts:
    - source: '/mnt/gevulot/output/proof_output.json'
      retentionPeriod: 3600  # Keep on Gevulot IPFS for 1 hour

  # 5. Resource requirements
  resources:
    memory: 4096  # MB - model is 65MB, Halo2 needs headroom
    cpus: 4
    timeout: 120  # seconds - proof takes ~1.5s but allow startup time
