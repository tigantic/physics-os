name: CI
on: [pull_request, push]
jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install
      - run: pnpm -w run build:tokens
      - run: pnpm -w run lint
      - run: pnpm -w run typecheck
      - run: pnpm -w run build
      - run: pnpm -w run test:unit
      - run: pnpm -w run test:schema
