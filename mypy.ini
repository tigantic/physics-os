[mypy]
python_version = 3.11
warn_return_any = True
warn_unused_configs = True
warn_redundant_casts = True
ignore_missing_imports = True
strict_equality = True
show_error_codes = True
exclude = (?x)(
    ^build/
    | ^dist/
    | ^\.venv/
    | ^tensornet\.egg-info/
    | ^__pycache__/
  )

# Per-module options
[mypy-tests.*]
ignore_errors = True

[mypy-benchmarks.*]
ignore_errors = True

# Core modules - check types that exist
[mypy-tensornet.core.*]
disallow_untyped_defs = False
check_untyped_defs = True
warn_return_any = True

[mypy-tensornet.algorithms.*]
disallow_untyped_defs = False
check_untyped_defs = True
warn_return_any = True

[mypy-tensornet.cfd.*]
disallow_untyped_defs = False
check_untyped_defs = True
warn_return_any = True

# Validation module - enhanced checking
[mypy-tensornet.validation.*]
disallow_untyped_defs = False
check_untyped_defs = True
warn_return_any = True

# Provenance module - enhanced checking
[mypy-tensornet.provenance.*]
disallow_untyped_defs = False
check_untyped_defs = True
warn_return_any = True
