[mypy]
python_version = 3.11
warn_return_any = True
warn_unused_configs = True
ignore_missing_imports = True
exclude = (?x)(
    ^build/
    | ^dist/
    | ^\.venv/
    | ^tensornet\.egg-info/
    | ^__pycache__/
  )

# Per-module options
[mypy-tests.*]
ignore_errors = True

[mypy-benchmarks.*]
ignore_errors = True

[mypy-tensornet.core.*]
disallow_untyped_defs = False
check_untyped_defs = True

[mypy-tensornet.algorithms.*]
disallow_untyped_defs = False
check_untyped_defs = True

[mypy-tensornet.cfd.*]
disallow_untyped_defs = False
check_untyped_defs = True
