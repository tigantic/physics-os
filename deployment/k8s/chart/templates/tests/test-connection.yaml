apiVersion: v1
kind: Pod
metadata:
  name: {{ include "fluidelite.fullname" . }}-test-connection
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fluidelite.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: health-check
      image: curlimages/curl:8.5.0
      command:
        - sh
        - -c
        - |
          set -e
          echo "=== Testing /health endpoint ==="
          curl -sf http://{{ include "fluidelite.fullname" . }}:{{ .Values.service.apiPort }}/health
          echo ""
          echo "=== Testing /ready endpoint ==="
          curl -sf http://{{ include "fluidelite.fullname" . }}:{{ .Values.service.apiPort }}/ready
          echo ""
          echo "=== Testing /metrics endpoint ==="
          curl -sf http://{{ include "fluidelite.fullname" . }}:{{ .Values.service.metricsPort }}/metrics | head -20
          echo ""
          echo "=== Testing /stats endpoint ==="
          curl -sf http://{{ include "fluidelite.fullname" . }}:{{ .Values.service.apiPort }}/stats
          echo ""
          echo "All tests passed."
