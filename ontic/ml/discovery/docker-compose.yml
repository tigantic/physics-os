# TensorNet Discovery Engine - Docker Compose
# Production deployment configuration

version: "3.9"

services:
  # Main API server
  discovery-api:
    build:
      context: ../..
      dockerfile: ontic/discovery/Dockerfile
      target: production
    image: ontic/discovery:1.8.0
    container_name: tensornet-discovery-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - TENSORNET_ENV=production
      - TENSORNET_LOG_LEVEL=INFO
      - TENSORNET_METRICS_ENABLED=true
      - TENSORNET_MAX_WORKERS=4
      - TENSORNET_RATE_LIMIT=100
    volumes:
      - discovery-data:/app/data
      - discovery-cache:/app/cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    networks:
      - tensornet

  # Worker nodes for distributed computation
  discovery-worker:
    build:
      context: ../..
      dockerfile: ontic/discovery/Dockerfile
      target: production
    image: ontic/discovery:1.8.0
    restart: unless-stopped
    command: ["python", "-m", "tensornet.discovery", "worker", "--coordinator", "discovery-api:8000"]
    environment:
      - TENSORNET_ENV=production
      - TENSORNET_WORKER_ID=${HOSTNAME:-worker}
      - TENSORNET_COORDINATOR_URL=http://discovery-api:8000
    deploy:
      mode: replicated
      replicas: 2
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    depends_on:
      discovery-api:
        condition: service_healthy
    networks:
      - tensornet

  # Redis for caching and pub/sub
  redis:
    image: redis:7-alpine
    container_name: tensornet-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    networks:
      - tensornet

  # Prometheus for metrics
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: tensornet-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    networks:
      - tensornet

  # Grafana for dashboards
  grafana:
    image: grafana/grafana:10.1.0
    container_name: tensornet-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-tensornet}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    networks:
      - tensornet

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: tensornet-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      discovery-api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    networks:
      - tensornet

volumes:
  discovery-data:
    driver: local
  discovery-cache:
    driver: local
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

networks:
  tensornet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
