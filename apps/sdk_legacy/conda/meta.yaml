{% set name = "hypertensor" %}
{% set version = "1.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  path: ../..

build:
  number: 0
  script: python -m pip install . -vv
  noarch: python

requirements:
  host:
    - python >=3.9
    - pip
    - setuptools
    - wheel
  run:
    - python >=3.9
    - numpy >=1.21
    - torch >=2.0
    - scipy >=1.9

test:
  imports:
    - tensornet
    - ontic.core
    - tensornet.substrate
    - tensornet.operators
  requires:
    - pytest
  commands:
    - pytest --pyargs tensornet -v

about:
  home: https://github.com/tigantic/HyperTensor
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE
  summary: QTT-compressed tensor network library for field simulation
  description: |
    HyperTensor is a high-performance tensor network library built on
    Quantized Tensor Train (QTT) decomposition. It provides a unified
    Field Substrate API for simulation, visualization, and AI environments.
  doc_url: https://hypertensor.readthedocs.io/
  dev_url: https://github.com/tigantic/HyperTensor

extra:
  recipe-maintainers:
    - tigantic
