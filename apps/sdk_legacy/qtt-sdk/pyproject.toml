[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "qtt-sdk"
version = "1.0.0"
description = "Billion-Point Tensor Compression for Big Data and Digital Twins"
readme = "README.md"
license = {text = "Proprietary - Tigantic Holdings LLC"}
requires-python = ">=3.9"
authors = [
    {name = "HyperTensor Team", email = "support@tigantic.com"}
]
maintainers = [
    {name = "HyperTensor Team", email = "support@tigantic.com"}
]
keywords = [
    "tensor-train",
    "qtt",
    "compression",
    "big-data",
    "digital-twin",
    "scientific-computing",
    "high-dimensional",
    "memory-efficient"
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: Other/Proprietary License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Scientific/Engineering :: Mathematics",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed"
]

dependencies = [
    "torch>=2.0.0",
    "numpy>=1.24.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
    "black>=23.0.0",
    "isort>=5.12.0",
    "mypy>=1.0.0",
    "ruff>=0.1.0",
]
docs = [
    "sphinx>=6.0.0",
    "sphinx-rtd-theme>=1.3.0",
    "myst-parser>=2.0.0",
]
cuda = [
    "torch>=2.0.0",  # With CUDA support
]

[project.urls]
Homepage = "https://github.com/tigantic/qtt-sdk"
Documentation = "https://qtt-sdk.readthedocs.io"
Repository = "https://github.com/tigantic/qtt-sdk.git"
Issues = "https://github.com/tigantic/qtt-sdk/issues"
Changelog = "https://github.com/tigantic/qtt-sdk/blob/main/CHANGELOG.md"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
"*" = ["py.typed"]

[tool.black]
line-length = 100
target-version = ["py39", "py310", "py311", "py312"]

[tool.isort]
profile = "black"
line_length = 100

[tool.ruff]
line-length = 100
target-version = "py39"

[tool.mypy]
python_version = "3.9"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --cov=qtt_sdk --cov-report=term-missing"
