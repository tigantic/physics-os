# physics-os Phase 7 Hardening Pipeline
# ============================================
# Runs the productization quality gates:
#   - Platform + Pack + Phase 5/6/7 test suites
#   - Determinism enforcement (bit-reproducible)
#   - Ledger schema validation
#   - SBOM generation & license audit
#   - Deprecation gate (no overdue removals)

name: Hardening

on:
  push:
    branches: [main, workspace-reorg]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: hardening-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Full Test Matrix
  # ──────────────────────────────────────────────────────────────────────────
  full-test:
    name: Full Test Suite (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install numpy scipy pytest pytest-timeout
          pip install -e . || true

      - name: Run all test suites
        run: |
          python -m pytest \
            tests/test_platform.py \
            tests/test_packs.py \
            tests/test_vv.py \
            tests/test_qtt_acceleration.py \
            tests/test_advanced_physics.py \
            tests/test_productization.py \
            tests/test_pwa_engine.py \
            -v --timeout=300 --tb=short

  # ──────────────────────────────────────────────────────────────────────────
  # Determinism Gate
  # ──────────────────────────────────────────────────────────────────────────
  determinism:
    name: Determinism Gate
    runs-on: ubuntu-latest
    needs: full-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install numpy scipy
          pip install -e . || true

      - name: Run determinism check
        run: |
          python -c "
          from ontic.platform.reproduce import ReproducibilityContext, hash_tensor
          from ontic.platform.data_model import StructuredMesh, FieldData, SimulationState
          import torch, math

          def run_once(seed):
              with ReproducibilityContext(seed=seed) as ctx:
                  mesh = StructuredMesh(shape=(128,), domain=((0., 2*math.pi),))
                  x = mesh.cell_centers().squeeze()
                  u = torch.sin(x).to(torch.float64)
                  ctx.record('u', hash_tensor(FieldData('u', u, mesh).data))
              return ctx.provenance()

          for seed in [42, 123, 9999]:
              p1, p2 = run_once(seed), run_once(seed)
              h1 = p1['artifacts']['u']['digest']
              h2 = p2['artifacts']['u']['digest']
              assert h1 == h2, f'Determinism FAIL seed={seed}: {h1} != {h2}'
              print(f'  seed={seed}: PASS ({h1[:16]}...)')
          print('Determinism gate: ALL PASS')
          "

  # ──────────────────────────────────────────────────────────────────────────
  # SBOM + License + Deprecation
  # ──────────────────────────────────────────────────────────────────────────
  supply-chain:
    name: Supply Chain Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install numpy scipy
          pip install -e . || true

      - name: Generate SBOM
        run: |
          python -c "
          from ontic.platform.security import generate_sbom
          sbom = generate_sbom(output_path='sbom.json')
          print(f'SBOM: {len(sbom.components)} components')
          "

      - name: License audit
        run: |
          python -c "
          from ontic.platform.security import license_audit
          r = license_audit()
          print(r.summary())
          "

      - name: Deprecation gate
        run: |
          python -c "
          from ontic.platform.deprecation import check_version_gate
          overdue = check_version_gate()
          if overdue:
              for o in overdue:
                  print(f'OVERDUE: {o[\"name\"]} (removal {o[\"removal_version\"]})')
              exit(1)
          print('Deprecation gate: PASS (no overdue removals)')
          "

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sbom
          path: sbom.json
