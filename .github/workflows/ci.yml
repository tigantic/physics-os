# Ontic CI Pipeline
# ======================
# Runs on every push and pull request to main/develop
# Implements quality gates from physics_os_execution_checklist.md

name: CI

on:
  push:
    branches: [main, develop, master]
  pull_request:
    branches: [main, develop, master]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ============================================
  # Stage 0: Hygiene Check
  # ============================================
  hygiene:
    name: Hygiene Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for build artifacts
        run: |
          echo "Checking for build artifacts that should not be committed..."
          FAIL=0
          
          # Check for common build artifacts
          if [ -d "dist" ]; then
            echo "ERROR: dist/ directory should not be committed"
            FAIL=1
          fi
          
          if [ -d "build" ]; then
            echo "ERROR: build/ directory should not be committed"
            FAIL=1
          fi
          
          if ls *.egg-info 1> /dev/null 2>&1; then
            echo "ERROR: .egg-info directories should not be committed"
            FAIL=1
          fi
          
          if find . -name "__pycache__" -type d 2>/dev/null | grep -q .; then
            echo "ERROR: __pycache__ directories should not be committed"
            FAIL=1
          fi
          
          if find . -name "*.pyc" 2>/dev/null | grep -q .; then
            echo "ERROR: .pyc files should not be committed"
            FAIL=1
          fi
          
          if [ $FAIL -eq 1 ]; then
            echo ""
            echo "Please remove build artifacts before committing."
            echo "Run: git clean -fdx to remove untracked files"
            exit 1
          fi
          
          echo "✓ No build artifacts found"

      - name: Set up Python for hygiene checks
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install minimal dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch numpy scipy
          pip install -e . || true

      - name: Check for import cycles
        run: python tools/scripts/check_import_cycles.py

  # ============================================
  # Stage 1: Lint & Format
  # ============================================
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    needs: [hygiene]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pre-commit

      - name: Run pre-commit hooks
        run: pre-commit run --all-files --show-diff-on-failure
        continue-on-error: true
        timeout-minutes: 5

      - name: Lint (Ruff)
        run: ruff check ontic physics_os tests proofs
        continue-on-error: true  # Pre-existing findings in 362K LOC

      - name: Format check (Ruff)
        run: ruff format --check ontic physics_os tests proofs
        continue-on-error: true  # Pre-existing findings in 362K LOC

  # ============================================
  # Stage 2: Type Checking
  # ============================================
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mypy torch numpy

      - name: Run mypy
        run: python -m mypy ontic --ignore-missing-imports
        continue-on-error: true  # 4238 pre-existing errors — tracked for incremental fix

  # ============================================
  # Stage 3: Security Scan
  # ============================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit detect-secrets

      - name: Run Bandit
        run: bandit -r ontic -lll -ii --skip B104
        continue-on-error: true  # Pre-existing findings in 362K LOC — tracked for incremental fix

      - name: Check for secrets
        run: detect-secrets scan --baseline .secrets.baseline

  # ============================================
  # Stage 4: Unit Tests
  # ============================================
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests with coverage
        run: pytest tests/ -v --ignore=tests/integration -x --tb=short --cov=ontic --cov-report=xml --cov-report=term-missing
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          verbose: true

  # ============================================
  # Stage 5: Integration Tests
  # ============================================
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test-unit]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,benchmark]"

      - name: Run integration tests
        run: pytest tests/integration/ -v -x --tb=short

  # ============================================
  # Stage 6: Proofs
  # ============================================
  proofs:
    name: Formal Proofs
    runs-on: ubuntu-latest
    needs: [test-unit]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run proofs
        run: |
          python proofs/proof_mps.py
          python proofs/proof_algorithms.py
          python proofs/proof_decompositions.py
          python proofs/proof_cfd_conservation.py

  # ============================================
  # Stage 7: Build Package
  # ============================================
  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [test-unit, security]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build wheel
        run: python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ============================================
  # Stage 8: Cross-Platform Rust Extension Tests
  # ============================================
  rust-extension:
    name: Rust Extension (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [test-unit]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install maturin
        run: pip install maturin

      - name: Build Rust extension
        working-directory: crates/tci_core_rust
        run: maturin build --release
        continue-on-error: true  # Rust extension is optional

      - name: Install and test extension
        run: |
          pip install -e ".[dev]"
          python -c "from tests.test_tci_core_imports import *; import sys; sys.exit(0)"
        continue-on-error: true  # Rust extension is optional