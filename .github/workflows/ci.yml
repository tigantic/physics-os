name: HyperTensor CI

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main ]

env:
  PYTHONIOENCODING: utf-8

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch --index-url https://download.pytorch.org/whl/cpu
        pip install numpy scipy matplotlib pytest pytest-cov

    - name: Run unit tests
      run: |
        pytest tests/ -v --tb=short --cov=tensornet --cov-report=xml --cov-report=term-missing
      env:
        PYTHONIOENCODING: utf-8

    - name: Run proofs
      run: |
        python proofs/run_all_proofs.py
      env:
        PYTHONIOENCODING: utf-8

    - name: Check coverage threshold
      if: matrix.os == 'ubuntu-latest'
      run: |
        python -c "import xml.etree.ElementTree as ET; tree = ET.parse('coverage.xml'); root = tree.getroot(); coverage = float(root.attrib.get('line-rate', 0)) * 100; print(f'Coverage: {coverage:.1f}%'); print('::warning::Coverage below 80% threshold') if coverage < 80 else None"

    - name: Upload coverage to Codecov
      if: matrix.os == 'ubuntu-latest'
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-hypertensor
        fail_ci_if_error: false

  flagship:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch --index-url https://download.pytorch.org/whl/cpu
        pip install numpy scipy matplotlib

    - name: Run Flagship Pipeline
      run: |
        python demos/flagship_pipeline.py
      env:
        PYTHONIOENCODING: utf-8

    - name: Verify Evidence Pack
      run: |
        python evidence/flagship_pack/verify.py
      env:
        PYTHONIOENCODING: utf-8

    - name: Upload Evidence Pack
      uses: actions/upload-artifact@v4
      with:
        name: evidence-pack
        path: evidence/flagship_pack/
        retention-days: 30

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install linting tools
      run: |
        pip install flake8 mypy

    - name: Run flake8
      run: |
        flake8 tensornet/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 tensornet/ --count --exit-zero --max-complexity=15 --max-line-length=100 --statistics

    - name: Run mypy (optional type checking)
      run: |
        mypy tensornet/ --ignore-missing-imports --no-error-summary || true

  benchmark:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch --index-url https://download.pytorch.org/whl/cpu
        pip install numpy scipy matplotlib pytest

    - name: Run Performance Profiler
      run: |
        python scripts/profile_flagship.py
      env:
        PYTHONIOENCODING: utf-8

    - name: Upload Benchmark Results
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-results
        path: profile_results/
        retention-days: 90

  docs:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch --index-url https://download.pytorch.org/whl/cpu
        pip install numpy scipy

    - name: Generate API documentation
      run: |
        python tensornet/docs/api_reference.py
        echo "Generated $(ls -1 docs/api/*.md | wc -l) API reference files"

    - name: Validate documentation structure
      run: |
        test -f docs/tutorials/mps_ground_state.md || echo "::warning::Missing MPS tutorial"
        test -f docs/tutorials/cfd_compressible_flow.md || echo "::warning::Missing CFD tutorial"
        test -f docs/REQUIREMENTS_TRACEABILITY.md || echo "::warning::Missing requirements traceability"
        test -f CONTRIBUTING.md || echo "::warning::Missing CONTRIBUTING.md"
        echo "Documentation structure validated"

    - name: Upload docs artifact
      uses: actions/upload-artifact@v4
      with:
        name: api-docs
        path: docs/api/
        retention-days: 30
