# ─────────────────────────────────────────────────────────────────
# Facial Plastics Platform — CI Pipeline
# ─────────────────────────────────────────────────────────────────
# Runs on every push/PR that touches products/facial_plastics/**
#
# Gates:
#   1. mypy  — zero errors      (strict, Python 3.12)
#   2. pytest — all tests pass   (900+ tests, <5 min, coverage ≥ 85%)
#   3. container build           (Containerfile, smoke test)
# ─────────────────────────────────────────────────────────────────

name: Facial Plastics CI

on:
  push:
    branches: [main, develop]
    paths:
      - "products/facial_plastics/**"
      - ".github/workflows/facial-plastics-ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "products/facial_plastics/**"
      - ".github/workflows/facial-plastics-ci.yml"

env:
  PYTHON_VERSION: "3.12"
  PRODUCT_ROOT: products/facial_plastics

concurrency:
  group: facial-plastics-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ══════════════════════════════════════════════════════════════
  # Stage 1: Type checking
  # ══════════════════════════════════════════════════════════════
  typecheck:
    name: mypy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('requirements-lock.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-${{ env.PYTHON_VERSION }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy mypy pytest

      - name: Run mypy
        run: |
          python -m mypy ${{ env.PRODUCT_ROOT }} \
            --ignore-missing-imports \
            --no-implicit-optional \
            --warn-return-any \
            --warn-unused-configs \
            --disallow-untyped-defs \
            --python-version 3.12

  # ══════════════════════════════════════════════════════════════
  # Stage 2: Test suite
  # ══════════════════════════════════════════════════════════════
  test:
    name: pytest
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: typecheck
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('requirements-lock.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-${{ env.PYTHON_VERSION }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy pytest pytest-cov

      - name: Run tests with coverage
        run: |
          python -m pytest ${{ env.PRODUCT_ROOT }}/tests/ \
            -v --tb=short \
            --junitxml=test-results.xml \
            --cov=${{ env.PRODUCT_ROOT }} \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=85 \
            -x

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-results.xml
            coverage.xml
          retention-days: 30

  # ══════════════════════════════════════════════════════════════
  # Stage 3: Benchmark regression gate
  # ══════════════════════════════════════════════════════════════
  benchmark:
    name: Benchmark Regression
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy pytest

      - name: Run benchmark suite
        run: |
          python -c "
          import time, json, sys
          import numpy as np

          results = {}

          # 1. FEM assembly benchmark
          from products.facial_plastics.sim.fem_soft_tissue import SoftTissueFEM
          from products.facial_plastics.core.types import VolumeMesh
          nodes = np.random.randn(500, 3).astype(np.float64)
          elems = np.random.randint(0, 500, (1200, 4))
          mesh = VolumeMesh(nodes=nodes, elements=elems)
          fem = SoftTissueFEM(mesh, convergence_tol=1e-6, max_newton_iter=5)
          t0 = time.perf_counter()
          for _ in range(3):
              fem._assemble_system(np.zeros(nodes.shape))
          results['fem_assembly_ms'] = round((time.perf_counter() - t0) / 3 * 1000, 1)

          # 2. NSGA-II optimization benchmark
          from products.facial_plastics.metrics.optimizer import (
              PlanOptimizer, ObjectiveSpec, ParameterBound
          )
          opt = PlanOptimizer(
              objectives=[ObjectiveSpec('f1', 'minimize')],
              constraints=[],
              parameter_bounds=[ParameterBound(f'x{i}', -5, 5) for i in range(3)],
              population_size=20, n_generations=10, seed=42,
          )
          t0 = time.perf_counter()
          opt.optimize(lambda p: (np.array([np.sum(p**2)]), {}))
          results['nsga2_10gen_ms'] = round((time.perf_counter() - t0) * 1000, 1)

          # 3. Twin builder segmentation benchmark
          from products.facial_plastics.twin.segmentation import MultiStructureSegmenter
          vol = np.random.rand(32, 32, 32).astype(np.float32) * 1000 - 500
          seg = MultiStructureSegmenter()
          t0 = time.perf_counter()
          seg.segment(vol, spacing=(1.0, 1.0, 1.0))
          results['segmentation_32cube_ms'] = round((time.perf_counter() - t0) * 1000, 1)

          print(json.dumps(results, indent=2))

          # Gate: fail if any benchmark exceeds 60 seconds
          for k, v in results.items():
              if v > 60000:
                  print(f'::error::Benchmark {k} took {v}ms (>60s)', file=sys.stderr)
                  sys.exit(1)
          "

  # ══════════════════════════════════════════════════════════════
  # Stage 4: Container build + smoke test
  # ══════════════════════════════════════════════════════════════
  container:
    name: Container Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: benchmark
    steps:
      - uses: actions/checkout@v4

      - name: Build container image
        run: |
          docker build \
            -f ${{ env.PRODUCT_ROOT }}/Containerfile \
            -t hypertensor-facial-plastics:ci-${{ github.sha }} \
            .

      - name: Smoke test — import check
        run: |
          docker run --rm \
            hypertensor-facial-plastics:ci-${{ github.sha }} \
            python -c "
          from products.facial_plastics.core.types import VolumeMesh
          from products.facial_plastics.sim.orchestrator import SimOrchestrator
          from products.facial_plastics.reports import ReportBuilder
          print('All imports OK')
          "

      - name: Smoke test — CLI info
        run: |
          docker run --rm \
            hypertensor-facial-plastics:ci-${{ github.sha }} \
            info || true

      - name: Report image size
        run: |
          SIZE=$(docker image inspect hypertensor-facial-plastics:ci-${{ github.sha }} \
            --format '{{.Size}}')
          SIZE_MB=$((SIZE / 1048576))
          echo "Container image size: ${SIZE_MB} MB"
          if [ "$SIZE_MB" -gt 2048 ]; then
            echo "::warning::Container image exceeds 2 GB ($SIZE_MB MB)"
          fi

  # ══════════════════════════════════════════════════════════════
  # Stage 5: Push to GHCR (main branch only)
  # ══════════════════════════════════════════════════════════════
  registry-push:
    name: Push to GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: container
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      packages: write
      contents: read
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository_owner }}/hypertensor-facial-plastics
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and tag
        run: |
          docker build \
            -f ${{ env.PRODUCT_ROOT }}/Containerfile \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            .

      - name: Push to GHCR
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Summary
        run: |
          echo "### Container pushed :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest\`" >> $GITHUB_STEP_SUMMARY
