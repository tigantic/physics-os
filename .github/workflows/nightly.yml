# HyperTensor Nightly Performance Tests
# =====================================
# Runs performance benchmarks on a schedule to detect regressions

name: Nightly Performance

on:
  schedule:
    # Run at 2 AM UTC daily
    - cron: '0 2 * * *'
  workflow_dispatch:  # Allow manual trigger

env:
  PYTHON_VERSION: "3.11"

jobs:
  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,benchmark]"
          pip install pytest-benchmark

      - name: Run performance tests
        run: |
          pytest benchmarks/tests/ -v -m slow --benchmark-only --benchmark-json=benchmark_results.json
        continue-on-error: true

      - name: Run full benchmark suite
        run: |
          python benchmarks/qtt_compression.py --quick 2>&1 | tee qtt_benchmark.log
          python benchmarks/sod_shock_tube.py --quick 2>&1 | tee sod_benchmark.log
        continue-on-error: true

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.run_number }}
          path: |
            benchmark_results.json
            *_benchmark.log
          retention-days: 30

  rust-performance:
    name: Rust TCI Performance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Rust
        uses: dtolnay/rust-action@stable
        with:
          toolchain: stable

      - name: Build and benchmark Rust extension
        working-directory: tci_core_rust
        run: |
          cargo build --release
          cargo bench 2>&1 | tee rust_benchmark.log
        continue-on-error: true

      - name: Compare Rust vs Python TCI
        run: |
          pip install -e ".[dev]"
          python benchmarks/rust_vs_python_tci.py 2>&1 | tee rust_vs_python.log
        continue-on-error: true

      - name: Upload Rust benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: rust-benchmarks-${{ github.run_number }}
          path: |
            rust_benchmark.log
            rust_vs_python.log
          retention-days: 30
