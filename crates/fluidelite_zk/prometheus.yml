# FluidElite ZK Prometheus Configuration
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'fluidelite'
    static_configs:
      - targets: ['fluidelite:9090']
    metrics_path: /metrics
    
  - job_name: 'fluidelite-api'
    static_configs:
      - targets: ['fluidelite:8080']
    metrics_path: /metrics
