[package]
name = "integration-suite"
version = "0.1.0"
edition = "2021"
rust-version = "1.73.0"
authors = ["Bradly Biron Baker Adams <brad@tigantic.com>"]
description = "Cross-layer integration tests for the Trustless Physics pipeline"
license = "LicenseRef-Proprietary"
publish = false

# No lib — this crate exists solely for integration tests
[lib]
name = "integration_suite"
path = "src/lib.rs"

[dependencies]
# Pipeline crates
proof-bridge = { path = "../../crates/proof_bridge" }
fluidelite-core = { path = "../../fluidelite-core" }
fluidelite-circuits = { path = "../../fluidelite-circuits", features = ["halo2"] }

# Crypto
sha2 = "0.10"
hex = "0.4"
ed25519-dalek = { version = "2.1", features = ["rand_core"] }
rand = "0.8"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# UUID
uuid = { version = "1.7", features = ["v4"] }

# Temp files
tempfile = "3.10"

# Error handling
anyhow = "1.0"
